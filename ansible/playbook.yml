---
- name: Deploy Node.js application
  hosts: all
  become: true
  vars:
    app_dir: /home/ec2-user/app
    node_version: "20"
    app_archive: "/tmp/artifact/app.tar.gz"
    db_host: ""
    db_port: "5432"
    db_name: "appdb"
    db_user: "appuser"
    db_password: ""

  tasks:
    # -------------------------------------------------------------------------
    # System packages
    # -------------------------------------------------------------------------
    - name: Update all system packages
      dnf:
        name: "*"
        state: latest
        update_only: true

    - name: Install required system packages
      dnf:
        name:
          - git
          - nginx
          - tar
          - gzip
          - curl
        state: present

    # -------------------------------------------------------------------------
    # Node.js 20 via NodeSource
    # -------------------------------------------------------------------------
    - name: Check if Node.js is already installed
      command: node --version
      register: node_check
      ignore_errors: true
      changed_when: false

    - name: Download NodeSource setup script
      get_url:
        url: "https://rpm.nodesource.com/setup_20.x"
        dest: /tmp/nodesource_setup.sh
        mode: "0755"
      when: node_check.rc != 0 or not node_check.stdout is search('v20')

    - name: Run NodeSource setup script
      command: bash /tmp/nodesource_setup.sh
      when: node_check.rc != 0 or not node_check.stdout is search('v20')

    - name: Install Node.js 20
      dnf:
        name: nodejs
        state: present
      when: node_check.rc != 0 or not node_check.stdout is search('v20')

    - name: Install PM2 globally
      npm:
        name: pm2
        global: true
        state: present

    # -------------------------------------------------------------------------
    # Application directory
    # -------------------------------------------------------------------------
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Copy application archive to server
      copy:
        src: "{{ app_archive }}"
        dest: /tmp/app.tar.gz
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Extract application archive
      unarchive:
        src: /tmp/app.tar.gz
        dest: "{{ app_dir }}"
        remote_src: true
        owner: ec2-user
        group: ec2-user
        extra_opts:
          - "--strip-components=0"

    - name: Install npm production dependencies
      npm:
        path: "{{ app_dir }}"
        production: true
        state: present
      become_user: ec2-user

    # -------------------------------------------------------------------------
    # .env file — rendered via shell to avoid copy: content: failures on empty values
    # -------------------------------------------------------------------------
    - name: Write .env file via shell
      shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        DATABASE_URL=postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}
        DB_SSL=true
        NODE_ENV=production
        PORT=3000
        ENVEOF
        chown ec2-user:ec2-user {{ app_dir }}/.env
        chmod 600 {{ app_dir }}/.env
      args:
        executable: /bin/bash

    # -------------------------------------------------------------------------
    # Nginx configuration
    # -------------------------------------------------------------------------
    - name: Write Nginx configuration
      shell: |
        cat > /etc/nginx/conf.d/app.conf << 'NGINXEOF'
        server {
            listen 80 default_server;
            listen [::]:80 default_server;
            server_name _;

            location / {
                proxy_pass         http://127.0.0.1:3000;
                proxy_http_version 1.1;
                proxy_set_header   Upgrade $http_upgrade;
                proxy_set_header   Connection 'upgrade';
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
            }
        }
        NGINXEOF
      args:
        executable: /bin/bash

    - name: Remove default Nginx server block if present
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent

    - name: Enable and start Nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted
        daemon_reload: true

    # -------------------------------------------------------------------------
    # PM2 — start / restart application
    # -------------------------------------------------------------------------
    - name: Stop existing PM2 app if running
      shell: pm2 delete app || true
      become_user: ec2-user
      args:
        executable: /bin/bash

    - name: Start application with PM2
      shell: |
        cd {{ app_dir }}
        pm2 start npm --name app -- start --update-env
      become_user: ec2-user
      args:
        executable: /bin/bash
      environment:
        PATH: "/usr/bin:/usr/local/bin:/home/ec2-user/.nvm/versions/node/v{{ node_version }}/bin:{{ ansible_env.PATH }}"

    - name: Configure PM2 startup on reboot
      shell: |
        pm2 startup systemd -u ec2-user --hp /home/ec2-user | tail -1 | bash || true
      args:
        executable: /bin/bash

    - name: Save PM2 process list
      shell: pm2 save --force
      become_user: ec2-user
      args:
        executable: /bin/bash

    # -------------------------------------------------------------------------
    # Local health check on the instance
    # -------------------------------------------------------------------------
    - name: Wait for application to respond on port 3000
      wait_for:
        host: 127.0.0.1
        port: 3000
        delay: 5
        timeout: 60

    - name: Verify application health endpoint locally
      uri:
        url: "http://127.0.0.1:3000/health"
        method: GET
        status_code: [200, 201, 202, 204]
        timeout: 10
      register: health_result
      retries: 6
      delay: 10
      until: health_result.status in [200, 201, 202, 204]
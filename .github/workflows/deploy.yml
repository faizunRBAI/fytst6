name: Deploy

on:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # TEST
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run linter (advisory only)
        run: npm run lint || true
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present

  # -------------------------------------------------------------------------
  # BUILD
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install production dependencies
        run: npm install --omit=dev

      - name: Create application archive
        run: |
          tar -czf /tmp/app.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='terraform' \
            --exclude='ansible' \
            --exclude='*.test.js' \
            --exclude='*.spec.js' \
            .

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-archive
          path: /tmp/app.tar.gz
          retention-days: 1

  # -------------------------------------------------------------------------
  # DEPLOY
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    env:
      TF_DIR: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download application artifact
        uses: actions/download-artifact@v4
        with:
          name: app-archive
          path: /tmp/artifact

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Generate SSH key pair
        run: |
          ssh-keygen -t rsa -b 4096 -f /tmp/deploy_key -N ""
          echo "SSH_PRIVATE_KEY_PATH=/tmp/deploy_key" >> $GITHUB_ENV
          echo "SSH_PUBLIC_KEY=$(cat /tmp/deploy_key.pub)" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="public_key=${{ env.SSH_PUBLIC_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD || 'changeme_strong_password_123' }}"

      - name: Capture Terraform outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          RDS_PORT=$(terraform output -raw rds_port)
          RDS_DB_NAME=$(terraform output -raw rds_db_name)
          RDS_USERNAME=$(terraform output -raw rds_username)
          echo "EC2_PUBLIC_IP=${EC2_PUBLIC_IP}"         >> $GITHUB_ENV
          echo "RDS_ENDPOINT=${RDS_ENDPOINT}"           >> $GITHUB_ENV
          echo "RDS_PORT=${RDS_PORT}"                   >> $GITHUB_ENV
          echo "RDS_DB_NAME=${RDS_DB_NAME}"             >> $GITHUB_ENV
          echo "RDS_USERNAME=${RDS_USERNAME}"           >> $GITHUB_ENV

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Wait for EC2 SSH to become available
        run: |
          echo "Waiting for SSH on $EC2_PUBLIC_IP ..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i "$SSH_PRIVATE_KEY_PATH" \
                   ec2-user@"$EC2_PUBLIC_IP" "echo ok" 2>/dev/null; then
              echo "SSH is available."
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: SSH not available after 300 seconds" >&2
          exit 1

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "$EC2_PUBLIC_IP," \
            --private-key="$SSH_PRIVATE_KEY_PATH" \
            -u ec2-user \
            --extra-vars "app_archive=/tmp/artifact/app.tar.gz \
              db_host=$RDS_ENDPOINT \
              db_port=$RDS_PORT \
              db_name=$RDS_DB_NAME \
              db_user=$RDS_USERNAME \
              db_password=${{ secrets.DB_PASSWORD || 'changeme_strong_password_123' }}"

      - name: Self-verify — health check
        run: |
          echo "Waiting for the application to respond at http://$EC2_PUBLIC_IP/health ..."
          SUCCESS=false
          for i in $(seq 1 24); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "http://$EC2_PUBLIC_IP/health" || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if echo "$HTTP_CODE" | grep -qE '^[23][0-9]{2}$'; then
              echo "Health check passed with HTTP $HTTP_CODE"
              SUCCESS=true
              break
            fi
            sleep 10
          done
          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR: Health check failed — app did not return 2xx/3xx after 240 seconds" >&2
            exit 1
          fi

      - name: Store deployment info
        if: success()
        run: |
          echo "Deployment successful!"
          echo "App URL : http://$EC2_PUBLIC_IP"
          echo "Health  : http://$EC2_PUBLIC_IP/health"

      # -----------------------------------------------------------------------
      # Destroy on failure (cleanup)  — only runs when a prior step fails
      # -----------------------------------------------------------------------
      - name: Terraform Destroy (on failure)
        if: failure()
        working-directory: ${{ env.TF_DIR }}
        run: |-
          terraform destroy -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="public_key=${{ env.SSH_PUBLIC_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD || 'changeme_strong_password_123' }}" \
            || true